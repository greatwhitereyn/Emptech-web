<style>
     body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #eaf0f1;
    }

  .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
       
        .navbar {
            width: 100%;
            display: flex;
            justify-content: flex-start; 
            align-items: center; 
            position: relative;
            z-index: 10;
            padding: 10px;
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 56px;
            font-weight: bold;
            color: #e29da6;
            position: absolute;
            left: 20px;
        }

        .button-nav {
            display: flex;
            justify-content: center; 
            gap: 20px;
            background-color: rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            align-items: center;
            margin-left: auto; 
            margin-right: auto; 
        }

        .button-nav a {
            text-decoration: none;
            background-color: transparent;
            border: 2px solid #CBADA5;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            color: #998378;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .button-nav a:hover {
            background-color: rgba(255, 255, 255, 0.4);
            color: #CBADA5;
            border-color: #e29da6;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }


    .breadcrumb {
        padding: 10px 20px;
        list-style: none;
        background: linear-gradient(90deg, #d0f4f2, #a3e4e3);
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        margin: 20px auto;
        width: fit-content;
        display: flex;
        justify-content: center;
    }
    .breadcrumb li {
        display: inline;
        font-size: 18px;
        font-weight: 500;
        color: #333;
    }
    .breadcrumb li:before {
        padding: 0 8px;
        color: #333;
        content: "\00a0>\00a0"; 
    }
    .breadcrumb li:first-child:before {
        content: ""; 
    }
    .breadcrumb li a {
        color: #61c0bf;
        text-decoration: none;
        transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .breadcrumb li a:hover {
        color: #3c8d8d;
        text-shadow: 0px 0px 6px rgba(0, 63, 127, 0.8);
    }


    /* Image grid styling */
    .image-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr); 
        gap: 20px;
        justify-content: center; 
        margin: 30px auto;
        width: fit-content;
    }

    .image-grid img {
        width: 150px; 
        height: 150px; 
        object-fit: cover;
	position: 80 100%;
        border-radius: 8px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-grid img:hover {
        transform: scale(1.1); 
        box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.3);
    }

    /* Pagination styling */
    .pagination {
        display: flex;
        justify-content: center;
        margin: 30px auto;
    }
    .pagination a {
        color: #0056b3;
        font-size: 16px;
        padding: 10px 16px;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
        border: 1px solid #0056b3;
        margin: 0 5px;
        border-radius: 5px;
        background-color: #d4eaff;
    }
    .pagination a.active {
        background: linear-gradient(90deg, #0056b3, #007bff);
        color: white;
        font-weight: bold;
        border: 1px solid #0056b3;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    }
    .pagination a:hover:not(.active) {
        background-color: #a3d4f7;
        color: #003f7f;
        transform: scale(1.1); 
    }
    .pagination a:first-child {
        border-top-left-radius: 8px;
        border-bottom-left-radius: 8px;
    }
    .pagination a:last-child {
        border-top-right-radius: 8px;
        border-bottom-right-radius: 8px;
    }
</style>
