<!DOCTYPE html>
<html>
<head> 
<title>Pagination orchid</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Pacifico&display=swap" rel="stylesheet">
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #eaf0f1;
    }

 .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Navbar styles */
.navbar {
  width: 100%;
  display: flex;
  justify-content: center; /* Center the nav items */
  align-items: center; 
  position: relative;
  z-index: 10;
  padding: 10px;
}


    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 56px;
      font-weight: bold;
      color: #e29da6;
      position: absolute;
      left: 20px;
    }

   .button-nav {
  display: flex;
  gap: 20px;
  background-color: rgba(255, 255, 255, 0.3);
  padding: 10px 20px;
  border-radius: 30px;
  box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
  align-items: center;
  /* margin-left: 180px; Remove this line */
}


    .button-nav a {
      text-decoration: none;
      background-color: transparent;
      border: 2px solid #CBADA5;
      padding: 8px 15px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 20px;
      color: #998378;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .button-nav a:hover {
      background-color: rgba(255, 255, 255, 0.4);
      color: #CBADA5;
      border-color: #e29da6;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }


    .breadcrumb {
        padding: 10px 20px;
        list-style: none;
        background: linear-gradient(90deg, #d0f4f2, #a3e4e3);
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        margin: 20px auto;
        width: fit-content;
        display: flex;
        justify-content: center;
    }
    .breadcrumb li {
        display: inline;
        font-size: 18px;
        font-weight: 500;
        color: #333;
    }
    .breadcrumb li:before {
        padding: 0 8px;
        color: #333;
        content: "\00a0>\00a0"; 
    }
    .breadcrumb li:first-child:before {
        content: ""; 
    }
    .breadcrumb li a {
        color: #61c0bf;
        text-decoration: none;
        transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .breadcrumb li a:hover {
        color: #3c8d8d;
        text-shadow: 0px 0px 6px rgba(0, 63, 127, 0.8);
    }

    .image-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        justify-content: center;
        margin: 30px auto;
        width: fit-content;
    }

    .product {
        background-color: #fff;
        padding: 30px 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: transform 0.3s, box-shadow 0.3s;
        margin: 20px;
        border: 2px solid #CBADA5;
        width: 250px;
        height: 350px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .product img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .product h3 {
        font-size: 18px;
        color: #d38a9b;
        margin-bottom: 5px;
    }

    .product .description {
        font-size: 14px;
        color: #777;
        margin-bottom: 10px;
    }

    .product .price {
        font-size: 20px;
        color: #CBADA5;
        font-weight: bold;
        margin-bottom: 15px;
    }

    .product .buy-btn {
        padding: 5px 10px;
        background-color: #CBADA5;
        color: #fff;
        border: 2px solid #CBADA5;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.3s, border-color 0.3s;
    }

    .product .buy-btn:hover {
        background-color: #e29da6;
        border-color: #e29da6;
        transform: scale(1.05);
    }

    .pagination {
        display: flex;
        justify-content: center;
        margin: 30px auto;
    }

    .pagination a {
        color: #61c0bf;
        font-size: 16px;
        padding: 10px 16px;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
        border: 1px solid #61c0bf;
        margin: 0 5px;
        border-radius: 5px;
        background-color: #eaf0f1;
    }

    .pagination a.active {
        background: linear-gradient(90deg, #3c8d8d, #61c0bf);
        color: white;
        font-weight: bold;
        border: 1px solid #3c8d8d;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    }

    .pagination a:hover:not(.active) {
        background-color: #b0e5e3;
        color: #3c8d8d;
        transform: scale(1.1);
    }

    .pagination a:first-child {
        border-top-left-radius: 8px;
        border-bottom-left-radius: 8px;
    }

    .pagination a:last-child {
        border-top-right-radius: 8px;
        border-bottom-right-radius: 8px;
    }
</style>
</head>
