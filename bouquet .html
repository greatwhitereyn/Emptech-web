<!DOCTYPE html>
<html>
<head> 
<title>Foreign Flowers</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Pacifico&display=swap" rel="stylesheet">
<style>
     body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #eaf0f1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
       
        .navbar {
            width: 100%;
            display: flex;
            justify-content: flex-start; 
            align-items: center; 
            position: relative;
            z-index: 10;
            padding: 10px;
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 56px;
            font-weight: bold;
            color: #e29da6;
            position: absolute;
            left: 20px;
        }

        .button-nav {
            display: flex;
            justify-content: center; 
            gap: 20px;
            background-color: rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            align-items: center;
            margin-left: auto; 
            margin-right: auto; 
        }

        .button-nav a {
            text-decoration: none;
            background-color: transparent;
            border: 2px solid #CBADA5;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            color: #998378;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .button-nav a:hover {
            background-color: rgba(255, 255, 255, 0.4);
            color: #CBADA5;
            border-color: #e29da6;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }


    .image-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        justify-content: center;
        margin: 30px auto;
        width: fit-content;
    }

    .product {
        background-color: #fff;
        padding: 30px 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: transform 0.3s, box-shadow 0.3s;
        margin: 20px;
        border: 2px solid #CBADA5;
        width: 250px;
        height: 350px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .product img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .product h3 {
        font-size: 18px;
        color: #d38a9b;
        margin-bottom: 5px;
    }

    .product .description {
        font-size: 14px;
        color: #777;
        margin-bottom: 10px;
    }

    .product .price {
        font-size: 20px;
        color: #CBADA5;
        font-weight: bold;
        margin-bottom: 15px;
    }

    .product .buy-btn {
        padding: 5px 10px;
        background-color: #CBADA5;
        color: #fff;
        border: 2px solid #CBADA5;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.3s, border-color 0.3s;
    }

    .product .buy-btn:hover {
        background-color: #e29da6;
        border-color: #e29da6;
        transform: scale(1.05);
    }

   
</style>
</head>
<body> 

<div class="container">

    <div class="logo">Lexisbloom</div> 
    <header class="navbar">
      <div class="button-nav">
        <a href="file:///E:/HOME%20MAIN.html">Home</a>
        <a href="file:///E:/ABOUT%20US.html">About</a>
        <a href="file:///E:/BEST%20SELLER.html">Best Seller</a>
        <a href="file:///E:/FLOWERS.html">Flowers</a>
        <a href="file:///E:/BOUQUET.html">Bouquet</a>
        <a href="file:///E:/FAQ'S.html">FAQ's</a>
      </div>
    </header>
  </div>
  
<div class="image-grid">
    <div class="product">
        <img src="nosegay.jpg" alt="Flower 1">
        <h3>Nosegay</h3>
        <p class="description">Bouquet</p>
        <p class="price">₱50</p>
        <button class="buy-btn">Buy</button>
    </div>
    <div class="product">
        <img src="bei.jpg" alt="Flower 2">
        <h3>Biedermeier</h3>
        <p class="description">Bouquet</p>
        <p class="price">₱50</p>
        <button class="buy-btn">Buy</button>
    </div>
    <div class="product">
        <img src="pres.jpg" alt="Flower 3">
        <h3>Presentation</h3>
        <p class="description">Bouquet</p>
        <p class="price">₱50</p>
        <button class="buy-btn">Buy</button>
    </div>
    <div class="product">
        <img src="round.jpg" alt="Flower 4">
        <h3>Round</h3>
        <p class="description">Bouquet</p>
        <p class="price">₱50</p>
        <button class="buy-btn">Buy</button>
    </div>
    <div class="product">
        <img src="handtied.jpg" alt="Flower 5">
        <h3>Hand Tied</h3>
        <p class="description">Bouquet</p>
        <p class="price">₱50</p>
        <button class="buy-btn">Buy</button>
    </div>
    <div class="product">
        <img src="shower.jpg" alt="Flower 6">
        <h3>Shower</h3>
        <p class="description">Bouquet</p>
        <p class="price">₱50</p>
        <button class="buy-btn">Buy</button>
    </div>
</div>



</div>
</body>
</html>
